; Inboxi outbound MTA — local submission only. The web app's SELF_HOST delivery
; driver connects here (127.0.0.1:587); Haraka relays to the internet on port 25.
; Bind to loopback so this submission port is never exposed publicly.
listen=127.0.0.1:587

; Haraka 3.2.x reads cfg.haproxy.hosts at startup and crashes if the section is
; absent. Define an empty list.
[haproxy]
hosts=
