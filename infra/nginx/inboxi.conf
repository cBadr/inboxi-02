# nginx reverse proxy for the Next.js app. TLS via certbot (Let's Encrypt).
# Place at /etc/nginx/sites-available/inboxi and symlink into sites-enabled.

server {
    listen 80;
    server_name inboxi.online www.inboxi.online;
    # certbot will manage the redirect to HTTPS after issuing certs.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name inboxi.online www.inboxi.online;

    ssl_certificate     /etc/letsencrypt/live/inboxi.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/inboxi.online/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
