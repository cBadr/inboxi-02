# nginx reverse proxy for the Next.js app (HTTP only).
# Run `certbot --nginx -d inboxi.online` to obtain a cert — certbot then injects
# the TLS (443) server block and the HTTP→HTTPS redirect automatically. Do NOT
# hardcode cert paths here before the cert exists (nginx -t would fail and the
# server would never come up → Cloudflare 521).
#
# Install: copy to /etc/nginx/sites-available/inboxi and symlink into sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name inboxi.online www.inboxi.online;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
